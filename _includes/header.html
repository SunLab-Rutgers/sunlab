<header class="site-header">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="container">
    <div class="header-inner">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.group.name }} home">
        <img class="brand-logo" src="{{ '/assets/images/logo.png' | relative_url }}" alt="" aria-hidden="true">
        <span class="brand-text">
          <strong class="brand-wordmark" aria-label="{{ site.group.name }}">
            <span class="wordmark-major">S</span><span class="wordmark-mid">UN</span>
            <span class="wordmark-gap"></span>
            <span class="wordmark-mid">LAB</span>
          </strong>
          <small>at Rutgers University</small>
        </span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        <span class="sr-only">Toggle navigation</span>
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      {% for item in site.nav %}
        {% assign child_urls = item.children | map: "url" %}
        <div class="nav-item{% if item.children %} has-children{% endif %}">
          <a href="{{ item.url | relative_url }}" {% if page.url == item.url or child_urls contains page.url %}aria-current="page"{% endif %}>{{ item.title }}</a>
          {% if item.children %}
            <div class="nav-submenu">
              {% for child in item.children %}
                <a href="{{ child.url | relative_url }}" {% if page.url == child.url %}aria-current="page"{% endif %}>{{ child.title }}</a>
              {% endfor %}
            </div>
          {% endif %}
        </div>
      {% endfor %}
      <div class="site-search-form" role="search" data-search-root>
        <span class="site-search-icon" aria-hidden="true">⌕</span>
        <label class="sr-only" for="site-search-input">Search the website</label>
        <input id="site-search-input" class="site-search-input" type="search" placeholder="Search" autocomplete="off" data-search-input data-search-index="{{ '/search.json' | relative_url }}">
        <div class="site-search-results" data-search-results hidden>
          <p class="site-search-empty">Start typing to search.</p>
        </div>
      </div>
    </nav>
  </div>
</header>

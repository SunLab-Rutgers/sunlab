<header class="site-header">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="container">
    <div class="header-inner">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.group.name }} home">
        <img class="brand-logo" src="{{ '/assets/images/logo.png' | relative_url }}" alt="" aria-hidden="true">
        <span class="brand-text">
          <strong class="brand-wordmark" aria-label="{{ site.group.name }}">
            <span class="wordmark-major">S</span><span class="wordmark-mid">UN</span>
            <span class="wordmark-gap"></span>
            <span class="wordmark-mid">LAB</span>
          </strong>
          <small>at Rutgers University</small>
        </span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        <span class="sr-only">Toggle navigation</span>
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      {% for item in site.nav %}
        <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}aria-current="page"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
